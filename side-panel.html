<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;">
  <title>What They See</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh; color: #e0e0e0;
    }
    .header { background: rgba(255,255,255,0.05); padding: 16px 16px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 10; }
    .header h1 { color: #fff; font-size: 20px; }
    .header p { color: rgba(255,255,255,0.6); font-size: 12px; }
    .url-bar { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 12px; margin: 10px 12px 8px; display: none; align-items: center; gap: 8px; font-size: 12px; }
    .url-bar.active { display: flex; }
    .url-domain { font-weight: 600; color: #4ecdc4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .url-full { color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .url-status { padding: 2px 6px; border-radius: 4px; font-weight: 600; font-size: 10px; flex-shrink: 0; }
    .url-status.secure { background: rgba(78,205,196,0.2); color: #4ecdc4; }
    .url-status.insecure { background: rgba(255,75,75,0.2); color: #ff4b4b; }
    .container { padding: 0 12px 12px; }
    .scan-button { background: linear-gradient(45deg, #e94560, #c23152); border: none; color: white; padding: 12px; font-size: 15px; border-radius: 10px; cursor: pointer; width: 100%; margin: 8px 0 12px; box-shadow: 0 4px 15px rgba(233,69,96,0.4); transition: all 0.3s ease; font-weight: 600; }
    .scan-button:hover { transform: translateY(-1px); }
    .scan-button:disabled { opacity: 0.7; cursor: not-allowed; }
    .scan-button.scanning { background: linear-gradient(45deg, #4ecdc4, #44a08d); }
    .loading { display: none; text-align: center; margin: 16px 0; }
    .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #4ecdc4; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .tabs { display: flex; margin-bottom: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 3px; overflow-x: auto; gap: 2px; }
    .tab { flex: 1; min-width: 60px; padding: 7px 4px; text-align: center; background: transparent; border: none; color: rgba(255,255,255,0.5); cursor: pointer; border-radius: 6px; font-size: 11px; font-weight: 500; transition: all 0.2s ease; }
    .tab:hover { color: rgba(255,255,255,0.8); }
    .tab.active { background: rgba(78,205,196,0.2); color: #4ecdc4; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .results { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 14px; display: none; border: 1px solid rgba(255,255,255,0.08); }
    .score-card { background: linear-gradient(135deg, rgba(78,205,196,0.15), rgba(68,160,141,0.1)); border: 1px solid rgba(78,205,196,0.3); border-radius: 10px; padding: 16px; text-align: center; margin-bottom: 12px; }
    .score-ring { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: #fff; }
    .score-grade { font-size: 16px; font-weight: 700; margin-top: 4px; }
    .score-label { font-size: 12px; color: rgba(255,255,255,0.6); }
    .result-section { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .result-section:last-child { border-bottom: none; }
    .section-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 8px; }
    .section-content { font-size: 12px; line-height: 1.5; color: rgba(255,255,255,0.7); }
    .metric { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .metric:last-child { border-bottom: none; }
    .metric-label { color: rgba(255,255,255,0.6); font-size: 12px; }
    .metric-value { font-weight: 600; color: #fff; font-size: 12px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-green { background: rgba(78,205,196,0.2); color: #4ecdc4; }
    .badge-yellow { background: rgba(247,183,51,0.2); color: #f7b733; }
    .badge-red { background: rgba(255,75,75,0.2); color: #ff4b4b; }
    .badge-gray { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .alert { padding: 8px 10px; margin: 6px 0; border-radius: 6px; font-size: 12px; line-height: 1.4; }
    .alert-danger { background: rgba(255,75,75,0.1); border-left: 3px solid #ff4b4b; color: #ff8a8a; }
    .alert-warning { background: rgba(247,183,51,0.1); border-left: 3px solid #f7b733; color: #f7d070; }
    .alert-info { background: rgba(69,183,209,0.1); border-left: 3px solid #45b7d1; color: #7dd3e8; }
    .alert-success { background: rgba(78,205,196,0.1); border-left: 3px solid #4ecdc4; color: #7eddd4; }
    .alert strong { display: block; margin-bottom: 2px; }
    .chart-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .chart-label { font-size: 12px; color: rgba(255,255,255,0.5); width: 80px; flex-shrink: 0; }
    .chart-bar { flex: 1; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
    .chart-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .chart-count { font-size: 12px; color: rgba(255,255,255,0.5); width: 30px; text-align: right; }
    .domain-list { max-height: 200px; overflow-y: auto; }
    .domain-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 11px; }
    .domain-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .rec-item { display: flex; gap: 8px; padding: 8px; margin: 4px 0; background: rgba(0,0,0,0.2); border-radius: 6px; }
    .rec-icon { font-size: 16px; flex-shrink: 0; }
    .rec-content { flex: 1; }
    .rec-title { font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 2px; }
    .rec-desc { font-size: 11px; color: rgba(255,255,255,0.5); }
    .hidden { display: none !important; }
    .tracker-notification { background: rgba(247,183,51,0.1); border: 1px solid rgba(247,183,51,0.3); border-radius: 8px; padding: 10px; margin-bottom: 10px; }
    .notification-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .notification-close { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 14px; color: #f7b733; }
    .notification-body { font-size: 11px; color: #f7d070; }
    .cookie-table { width: 100%; font-size: 11px; border-collapse: collapse; margin-top: 6px; }
    .cookie-table th { text-align: left; color: rgba(255,255,255,0.5); padding: 3px 4px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 500; }
    .cookie-table td { padding: 3px 4px; border-bottom: 1px solid rgba(255,255,255,0.04); color: rgba(255,255,255,0.7); }
    .timeline-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: rgba(255,255,255,0.5); }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
    .timeline-bar-container { position: relative; height: 20px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
    .timeline-bar { position: absolute; top: 2px; height: 16px; border-radius: 3px; opacity: 0.7; min-width: 2px; }
    .timeline-labels { display: flex; justify-content: space-between; font-size: 9px; color: rgba(255,255,255,0.3); }
    .diff-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(78,205,196,0.2); border-radius: 8px; padding: 12px; margin-top: 12px; }
    .diff-title { font-size: 13px; font-weight: 600; color: #4ecdc4; margin-bottom: 6px; }
    .diff-item { padding: 3px 0; font-size: 11px; }
    .diff-add { color: #4ecdc4; }
    .diff-remove { color: #ff8a8a; }
    .diff-change { color: #f7b733; }
    .export-btn { background: rgba(78,205,196,0.2); border: 1px solid rgba(78,205,196,0.3); color: #4ecdc4; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; width: 100%; margin-top: 8px; }
    .export-btn:hover { background: rgba(78,205,196,0.3); }
    .threat-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:center;justify-content:center; }
    .threat-overlay.active { display:flex; }
    .threat-dialog { background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:24px;max-width:380px;width:90%;text-align:center; }
    .threat-dialog h3 { color:#fff;font-size:18px;margin-bottom:6px; }
    .threat-dialog p { color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:16px; }
    .threat-options { display:flex;flex-direction:column;gap:8px; }
    .threat-option { background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:14px;cursor:pointer;text-align:left;color:#fff;transition:all 0.2s; }
    .threat-option:hover { border-color:#4ecdc4;background:rgba(78,205,196,0.1); }
    .threat-option strong { display:block;margin-bottom:2px; }
    .threat-option span { font-size:11px;color:rgba(255,255,255,0.5); }
    .threat-skip { background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;margin-top:12px;font-size:12px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>What They See</h1>
    <p>Privacy & Security Scanner</p>
  </div>

  <div id="url-bar" class="url-bar">
    <span class="url-lock" id="url-lock-icon"></span>
    <div style="flex:1;min-width:0">
      <div class="url-domain" id="url-domain"></div>
      <div class="url-full" id="url-full"></div>
    </div>
    <span class="url-status" id="url-status"></span>
  </div>

  <div class="container">
    <button id="scanBtn" class="scan-button">Scan This Page</button>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p style="color:rgba(255,255,255,0.7);font-size:12px" id="loading-text">Analyzing...</p>
    </div>

    <div id="tabs" class="tabs hidden">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="security">Security</button>
      <button class="tab" data-tab="privacy">Privacy</button>
      <button class="tab" data-tab="cookies">Cookies</button>
      <button class="tab" data-tab="threats">Threats</button>
      <button class="tab" data-tab="network">Network</button>
      <button class="tab" data-tab="fingerprinting">Finger</button>
      <button class="tab" data-tab="analysis">Analysis</button>
      <button class="tab" data-tab="timeline">Timeline</button>
      <button class="tab" data-tab="recs">Tips</button>
    </div>

    <div id="results" class="results">
      <div id="overview" class="tab-content active">
        <div id="score-card" class="score-card">
          <div class="score-ring" id="score-ring">--</div>
          <div class="score-grade" id="score-grade"></div>
          <div class="score-label">Security Score</div>
        </div>
        <div id="overview-content"></div>
      </div>
      <div id="security" class="tab-content"><div id="security-content"></div></div>
      <div id="privacy" class="tab-content"><div id="privacy-content"></div></div>
      <div id="cookies" class="tab-content"><div id="cookies-content"></div></div>
      <div id="threats" class="tab-content"><div id="threats-content"></div></div>
      <div id="network" class="tab-content"><div id="network-content"></div></div>
      <div id="fingerprinting" class="tab-content"><div id="fingerprinting-content"></div></div>
      <div id="analysis" class="tab-content"><div id="analysis-content"></div></div>
      <div id="timeline" class="tab-content"><div id="timeline-content"></div></div>
      <div id="recs" class="tab-content"><div id="recs-content"></div></div>
    </div>
  </div>

  <div id="threat-overlay" class="threat-overlay">
    <div class="threat-dialog">
      <h3>What concerns you most?</h3>
      <p>Personalize your privacy score based on your threat model.</p>
      <div class="threat-options">
        <button class="threat-option" data-model="advertising"><span style="font-size:20px;margin-right:8px">&#128226;</span><strong>Advertising</strong><span>Tracking, ads, cookies</span></button>
        <button class="threat-option" data-model="surveillance"><span style="font-size:20px;margin-right:8px">&#128065;</span><strong>Surveillance</strong><span>Fingerprinting, geolocation</span></button>
        <button class="threat-option" data-model="financial"><span style="font-size:20px;margin-right:8px">&#128274;</span><strong>Financial</strong><span>Security, HTTPS, payment</span></button>
      </div>
      <button class="threat-skip" id="threat-skip">Skip</button>
    </div>
  </div>

  <script src="domains.js"></script>
  <script src="scoring-weights.js"></script>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
  <script src="side-panel.js"></script>
</body>
</html>
